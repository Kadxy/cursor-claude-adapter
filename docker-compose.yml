services:
  cursor-claude-adapter:
    build: .
    image: cursor-claude-adapter:latest
    container_name: cursor-claude-adapter
    restart: unless-stopped
    # Bind to loopback only by default; expose publicly via a tunnel (cloudflared).
    # Override BIND=0.0.0.0 to listen on all interfaces.
    ports:
      - "${BIND:-127.0.0.1}:${PORT:-3000}:3000"
    env_file: .env
    environment:
      - PORT=3000
