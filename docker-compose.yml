services:
  cursor-claude-adapter:
    build: .
    image: cursor-claude-adapter:latest
    container_name: cursor-claude-adapter
    restart: unless-stopped
    # Loopback-only; front with a reverse proxy / cloudflared. Use 0.0.0.0 to listen on all interfaces.
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
